<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fallingo REST API — Docs</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    body { margin: 0; }
    .notice {
      background: #fff7e6; border-bottom: 1px solid #f0d9a8; color: #7a5b00;
      font: 14px/1.5 -apple-system, "Pretendard", sans-serif;
      padding: 10px 16px; text-align: center;
    }
  </style>
</head>
<body>
  <div class="notice">
    ⚠️ Fallingo API 서버는 현재 중단 상태입니다 — 이 페이지는 스키마 문서 열람용입니다 ("Try it out" 동작 안 함).
    서비스 소개: <a href="https://su-record.github.io/stories/#/about" rel="noopener">about</a>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    window.ui = SwaggerUIBundle({
      url: './openapi.json',
      dom_id: '#swagger-ui',
      deepLinking: true,
      docExpansion: 'none',
      defaultModelsExpandDepth: 0,
      tryItOutEnabled: false,
      supportedSubmitMethods: [],
    });
  </script>
</body>
</html>
